<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Secretaria — Clínica Kadri</title>

<style>
  :root{
    --pri:#0f766e; --pri-d:#0b5850; --bg:#eef2f7; --card:#fff; --ink:#1e293b;
    --mut:#64748b; --line:#e2e8f0; --ok:#0e7a4b; --warn:#b45309; --err:#b91c1c;
    --sat:env(safe-area-inset-top); --sab:env(safe-area-inset-bottom);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font:16px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);
    padding-bottom:calc(16px + var(--sab))}
  .top{position:sticky;top:0;z-index:50;background:var(--pri);color:#fff;padding:calc(10px + var(--sat)) 16px 12px;
    display:flex;align-items:center;gap:10px;box-shadow:0 2px 8px rgba(0,0,0,.15)}
  .top h1{font-size:16px;font-weight:700;margin:0;flex:1;letter-spacing:.2px}
  .top .back{background:rgba(255,255,255,.16);border:0;color:#fff;font-size:15px;border-radius:8px;padding:7px 11px;cursor:pointer}
  .wrap{max-width:640px;margin:0 auto;padding:16px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin:0 0 14px;box-shadow:0 1px 3px rgba(15,23,42,.05)}
  h2{font-size:15px;margin:0 0 12px;color:var(--pri-d)}
  label.f{display:block;margin:0 0 12px}
  label.f>span{display:block;font-size:13px;color:var(--mut);margin:0 0 5px;font-weight:600}
  input,select,textarea{width:100%;font:inherit;color:var(--ink);background:#fff;border:1.5px solid var(--line);
    border-radius:10px;padding:12px 13px;outline:none;-webkit-appearance:none;appearance:none}
  input:focus,select:focus,textarea:focus{border-color:var(--pri)}
  textarea{min-height:100px;resize:vertical;line-height:1.5}
  .row{display:flex;gap:10px}.row>*{flex:1}
  .btn{display:block;width:100%;text-align:center;background:var(--pri);color:#fff;border:0;border-radius:12px;
    padding:15px;font-size:16px;font-weight:700;cursor:pointer}
  .btn:active{background:var(--pri-d)}
  .btn[disabled]{opacity:.55}
  .btn.sec{background:#fff;color:var(--pri);border:1.5px solid var(--pri)}
  .btn.warn{background:var(--warn)}
  .btn.ok{background:var(--ok)}
  .btn.sm{padding:11px;font-size:14px;border-radius:10px}
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .tile{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:20px 14px;text-align:center;cursor:pointer;
    box-shadow:0 1px 3px rgba(15,23,42,.05)}
  .tile:active{border-color:var(--pri);background:#f0fdfa}
  .tile .ic{font-size:28px;margin-bottom:8px}
  .tile .t{font-weight:700;font-size:15px}
  .tile .d{font-size:12px;color:var(--mut);margin-top:4px;line-height:1.35}
  .add{background:#f0fdfa;color:var(--pri);border:1.5px dashed var(--pri);border-radius:10px;padding:12px;width:100%;font-weight:600;cursor:pointer}
  .ac{position:relative}
  .ac-list{position:absolute;left:0;right:0;top:calc(100% + 3px);background:#fff;border:1px solid var(--line);border-radius:10px;
    box-shadow:0 8px 24px rgba(15,23,42,.14);max-height:260px;overflow:auto;z-index:20}
  .ac-list div{padding:11px 12px;border-bottom:1px solid var(--line);font-size:14px;cursor:pointer}
  .ac-list div:last-child{border-bottom:0}
  .ac-list div:active{background:#f0fdfa}
  .ac-list .sub{color:var(--mut);font-size:12px}
  .msg{padding:11px 13px;border-radius:10px;font-size:14px;margin:0 0 12px;font-weight:600;display:none}
  .msg.show{display:block}
  .msg.e{background:#fef2f2;color:var(--err)} .msg.o{background:#ecfdf5;color:var(--ok)} .msg.i{background:#eff6ff;color:#0b5850}
  .hint{font-size:12.5px;color:var(--mut);margin:6px 0 0}
  .hide{display:none!important}
  .foot{text-align:center;color:var(--mut);font-size:11.5px;padding:8px 0 0}
  .picked{display:flex;align-items:center;gap:10px;background:#ecfdf5;border:1px solid #a7f3d0;border-radius:10px;padding:12px 13px}
  .picked>div{flex:1}.picked b{color:var(--pri-d)}.picked .sub{font-size:12px;color:var(--mut);margin-top:2px}
  .picked .chg{background:#fff;border:1.5px solid var(--pri);color:var(--pri);border-radius:8px;padding:7px 12px;font-weight:600;cursor:pointer}
  .spin{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:s .7s linear infinite;vertical-align:-3px;margin-right:7px}
  @keyframes s{to{transform:rotate(360deg)}}
  .doc{border:1px solid var(--line);border-radius:12px;padding:12px 13px;margin:0 0 10px}
  .doc .h{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
  .doc .h b{font-size:14.5px}
  .doc .dt{color:var(--mut);font-size:12.5px;white-space:nowrap}
  .doc .st{font-size:12.5px;margin:4px 0 0}
  .doc .st.sig{color:var(--ok);font-weight:600}
  .doc .st.uns{color:var(--mut)}
  .doc .acts{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .doc .acts a,.doc .acts button{flex:1;min-width:90px;text-align:center;text-decoration:none;font-size:13px;font-weight:600;
    padding:9px 8px;border-radius:9px;border:1.5px solid var(--line);color:var(--pri);background:#fff;cursor:pointer}
  .doc .acts a:active,.doc .acts button:active{background:#f0fdfa}
  .doc .acts .wa{border-color:#25d366;color:#128c39}
  /* Orçamento */
  .prod{display:flex;align-items:flex-start;gap:10px;padding:11px 4px;border-bottom:1px solid var(--line)}
  .prod:last-child{border-bottom:0}
  .prod input[type=checkbox]{width:22px;height:22px;flex:0 0 auto;margin-top:1px}
  .prod .nm{font-size:14px;line-height:1.3}
  .prod .pr{font-size:12.5px;color:var(--mut);margin-top:2px}
  .orcprev{background:#fff;color:#111;border:1px solid var(--line);border-radius:12px;padding:20px 18px;font-family:-apple-system,Georgia,serif}
  .orcprev .oh{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid var(--pri);padding-bottom:10px;margin-bottom:12px}
  .orcprev .oh .clin{font-weight:800;color:var(--pri-d);font-size:15px}
  .orcprev .oh .sub{font-size:11.5px;color:#555}
  .orcprev .om{font-size:12.5px;color:#333;margin:0 0 10px}
  .orcprev table{width:100%;border-collapse:collapse;font-size:12.5px}
  .orcprev th{text-align:left;color:#555;border-bottom:1px solid #ddd;padding:5px 4px;font-weight:600}
  .orcprev td{padding:6px 4px;border-bottom:1px solid #f0f0f0;vertical-align:top}
  .orcprev td.v{text-align:right;white-space:nowrap}
  .orcprev tfoot td{border-top:2px solid #ddd;border-bottom:0;font-weight:700;padding-top:8px}
  .orcprev .obs{font-size:10.5px;color:#777;margin-top:12px;line-height:1.4}
</style>
</head>
<body>
<div class="top">
  <button class="back hide" id="back">‹ Voltar</button>
  <h1 id="title">Secretaria</h1>
</div>
<div class="wrap" id="app"></div>
<div class="foot">Clínica Kadri · Secretaria</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" crossorigin="anonymous"></script>
<script>
const $ = s => document.querySelector(s);
const esc = s => String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const app = $("#app"), title = $("#title"), backBtn = $("#back");
const MESES=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
let stack = [];

/* ---------- API helpers (cookie same-origin) ---------- */
async function api(url, opts={}){
  const r = await fetch(url, Object.assign({credentials:"same-origin", redirect:"follow"}, opts));
  return r;
}
async function apiJSON(url, opts={}){
  const r = await api(url, opts);
  let json=null; try{ json = await r.json(); }catch{}
  return { ok:r.ok, status:r.status, json };
}

/* ---------- router (stack) ---------- */
function go(render, ttl){ stack.push({render,ttl}); paint(); }
function back(){ if(stack.length>1){ stack.pop(); paint(); } }
function reset(render, ttl){ stack=[{render,ttl}]; paint(); }
function paint(){
  const cur = stack[stack.length-1];
  title.textContent = cur.ttl || "Secretaria";
  backBtn.classList.toggle("hide", stack.length<=1);
  app.innerHTML = "";
  cur.render(app);
  window.scrollTo(0,0);
}
backBtn.onclick = back;

function hoje(){const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}
function dataExtenso(iso){if(!iso)return "";const [y,m,d]=iso.split("-").map(Number);return `${d} de ${MESES[m-1]} de ${y}`;}
function brl(n){ return "R$ " + Number(n||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2}); }

/* ---------- reusable patient picker ---------- */
function pacPicker(root, onPick){
  root.innerHTML = `<div class="ac">
    <label class="f" style="margin:0"><span>Paciente</span>
      <input id="pacbusca" placeholder="Nome do paciente…" autocomplete="off" inputmode="search"></label>
    <div class="ac-list hide"></div></div>`;
  const inp = root.querySelector("#pacbusca");
  const list = root.querySelector(".ac-list");
  let t=null;
  inp.addEventListener("input", ()=>{
    const q = inp.value.trim();
    clearTimeout(t);
    if(q.length<2){ list.classList.add("hide"); list.innerHTML=""; return; }
    t=setTimeout(async ()=>{
      try{
        const r = await api("/secretaria/api/pacientes-busca?q="+encodeURIComponent(q));
        const arr = await r.json();
        if(!arr.length){ list.innerHTML=`<div class="sub" style="cursor:default">Nenhum paciente</div>`; list.classList.remove("hide"); return; }
        list.innerHTML = arr.map(p=>`<div data-id="${p.id}" data-nome="${esc(p.nome)}" data-tel="${esc(p.telefone||"")}">
          ${esc(p.nome)}${p.dn?`<span class="sub"> · ${p.dn.split("-").reverse().join("/")}</span>`:""}</div>`).join("");
        list.classList.remove("hide");
        list.querySelectorAll("div[data-id]").forEach(el=>el.onclick=()=>{
          list.classList.add("hide");
          onPick({ id:el.dataset.id, nome:el.dataset.nome, telefone:el.dataset.tel });
        });
      }catch{ list.classList.add("hide"); }
    },220);
  });
  return inp;
}

/* ========== LOGIN ========== */
function screenLogin(root){
  root.innerHTML = `
    <div class="card">
      <h2>Entrar</h2>
      <div class="msg e" id="lmsg"></div>
      <label class="f"><span>E-mail</span><input type="email" id="email" autocomplete="username" inputmode="email" placeholder="seu@email"></label>
      <label class="f"><span>Senha</span><input type="password" id="pass" autocomplete="current-password" placeholder="••••••••"></label>
      <button class="btn" id="entrar">Entrar</button>
    </div>`;
  const msg = root.querySelector("#lmsg");
  root.querySelector("#entrar").onclick = async (e)=>{
    const b=e.target; const email=root.querySelector("#email").value.trim(); const password=root.querySelector("#pass").value;
    if(!email||!password){ msg.textContent="Preencha e-mail e senha."; msg.classList.add("show"); return; }
    b.disabled=true; b.innerHTML=`<span class="spin"></span>Entrando…`; msg.classList.remove("show");
    try{
      const r=await api("/api/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password,remember:true})});
      if(!r.ok){ throw new Error(); }
      reset(screenHome,"Secretaria");
    }catch{ msg.textContent="E-mail ou senha inválidos."; msg.classList.add("show"); b.disabled=false; b.textContent="Entrar"; }
  };
}

/* ========== HOME ========== */
function screenHome(root){
  root.innerHTML = `
    <div class="tiles">
      <div class="tile" id="t-pac"><div class="ic">👤</div><div class="t">Pacientes</div><div class="d">Cadastrar e editar</div></div>
      <div class="tile" id="t-doc"><div class="ic">📄</div><div class="t">Documentos</div><div class="d">Reemitir e enviar</div></div>
      <div class="tile" id="t-age"><div class="ic">🗓️</div><div class="t">Agenda</div><div class="d">Consultas do dia</div></div>
      <div class="tile" id="t-orc"><div class="ic">🧾</div><div class="t">Orçamento</div><div class="d">Gerar e enviar</div></div>
    </div>`;
  root.querySelector("#t-pac").onclick = ()=>go(screenPacientes,"Pacientes");
  root.querySelector("#t-doc").onclick = ()=>go(screenDocumentos,"Documentos");
  root.querySelector("#t-age").onclick = ()=>{ location.href="/agenda"; };
  root.querySelector("#t-orc").onclick = ()=>go(screenOrcamento,"Orçamento");
}

/* ========== PACIENTES ========== */
function screenPacientes(root){
  root.innerHTML = `
    <div class="card">
      <h2>Buscar paciente</h2>
      <div id="pick"></div>
      <div id="pacres" class="hide"></div>
    </div>
    <button class="add" id="novo">+ Novo paciente</button>`;
  root.querySelector("#novo").onclick = ()=>{ location.href="/pront/novo"; };
  const res = root.querySelector("#pacres");
  pacPicker(root.querySelector("#pick"), (p)=>{
    res.classList.remove("hide");
    res.innerHTML = `
      <div class="picked" style="margin-top:12px"><div><b>${esc(p.nome)}</b>
        ${p.telefone?`<div class="sub">${esc(p.telefone)}</div>`:""}</div></div>
      <div class="row" style="margin-top:12px">
        <button class="btn sm" id="ficha">Abrir ficha</button>
        <button class="btn sm sec" id="edit">Editar dados</button>
      </div>`;
    res.querySelector("#ficha").onclick = ()=>{ location.href="/pront/paciente/"+p.id; };
    res.querySelector("#edit").onclick = ()=>{ location.href="/pront/paciente/"+p.id+"/editar"; };
  });
}

/* ========== DOCUMENTOS (reemitir / enviar) ========== */
function screenDocumentos(root){
  root.innerHTML = `
    <div class="card">
      <h2>Documentos do paciente</h2>
      <div id="pick"></div>
    </div>
    <div id="docs"></div>`;
  const box = root.querySelector("#docs");
  pacPicker(root.querySelector("#pick"), async (p)=>{
    box.innerHTML = `<div class="card"><span class="spin" style="border-top-color:var(--pri);border-color:#cbd5e1;border-top-color:var(--pri)"></span> Carregando…</div>`;
    const { ok, json } = await apiJSON("/secretaria/api/paciente/"+p.id+"/docs");
    if(!ok || !json){ box.innerHTML = `<div class="card"><div class="msg e show">Falha ao carregar documentos.</div></div>`; return; }
    const docs = json.docs||[];
    if(!docs.length){ box.innerHTML = `<div class="card"><p class="mut" style="margin:0;color:var(--mut)">Nenhum documento emitido para <b>${esc(p.nome)}</b>.</p></div>`; return; }
    box.innerHTML = `<div class="card"><h2>${esc(p.nome)} · ${docs.length} documento(s)</h2>${docs.map(d=>docCard(d)).join("")}</div>`;
    box.querySelectorAll("[data-copy]").forEach(b=>b.onclick=async()=>{
      try{ await navigator.clipboard.writeText(b.dataset.copy); b.textContent="Link copiado ✓"; setTimeout(()=>b.textContent="Copiar link",1500);}catch{ prompt("Copie o link:", b.dataset.copy); }
    });
  });
}
function docCard(d){
  const acts = [];
  acts.push(`<a href="${d.pdfUrl}" target="_blank" rel="noopener">Abrir PDF</a>`);
  if(d.podeCompartilhar){
    acts.push(`<button type="button" data-copy="${esc(d.verifUrl)}">Copiar link</button>`);
    if(d.waUrl) acts.push(`<a class="wa" href="${d.waUrl}" target="_blank" rel="noopener">WhatsApp</a>`);
  }
  return `<div class="doc">
    <div class="h"><b>${esc(d.tipoLabel)}</b><span class="dt">${(d.data||"").split("-").reverse().join("/")}</span></div>
    ${d.descricao?`<div class="st" style="color:var(--mut)">${esc(d.descricao)}</div>`:""}
    <div class="st ${d.assinado?"sig":"uns"}">${d.assinado?"✔ Assinado (ICP-Brasil)":"não assinado"}${d.paper?` · ${esc(d.paper)}`:""}</div>
    <div class="acts">${acts.join("")}</div>
  </div>`;
}

/* ========== ORÇAMENTO ========== */
let _produtos = null;
async function carregarProdutos(){
  if(_produtos) return _produtos;
  const apiUrl = "https://api.github.com/repos/doutorleandromendes/exames/contents/products.csv?ref=main";
  const resp = await fetch(apiUrl, { headers:{ Accept:"application/vnd.github.raw", "X-GitHub-Api-Version":"2022-11-28" }, mode:"cors", cache:"no-store", credentials:"omit" });
  if(!resp.ok) throw new Error("HTTP "+resp.status);
  const ct = (resp.headers.get("content-type")||"").toLowerCase();
  let data;
  if(!ct.includes("json")){ data = await resp.text(); }
  else {
    const j = await resp.json();
    const b64 = String(j.content||"").replace(/\n/g,"");
    try{ data = decodeURIComponent(escape(window.atob(b64))); }catch{ data = window.atob(b64); }
  }
  const linhas = data.trim().split("\n").map(l=>l.replace(/\r$/,"")).filter(Boolean);
  const out = [];
  for(const l of linhas){
    if(/^product name;/i.test(l)) continue;
    const parts = l.split(";");
    if(parts.length<3) continue;
    const nome = (parts[0]||"").trim();
    const preco = parseFloat(String(parts[1]||"").replace(",","."))||0;
    const pix = parseFloat(String(parts[2]||"").replace(",","."))||preco;
    const desc = (parts.slice(3).join(";")||"").replace(/<br\s*\/?>/gi," ").trim();
    if(nome) out.push({ nome, preco, pix, desc });
  }
  _produtos = out;
  return out;
}

function screenOrcamento(root){
  root.innerHTML = `
    <div class="card">
      <h2>Dados</h2>
      <div id="opick"></div>
      <label class="f"><span>Nome no orçamento</span><input id="onome" placeholder="Nome do paciente"></label>
      <label class="f" style="margin:0"><span>Data</span><input type="date" id="odata" value="${hoje()}"></label>
    </div>
    <div class="card">
      <h2>Exames</h2>
      <label class="f"><span>Filtrar</span><input id="ofiltro" placeholder="Digite para filtrar…" inputmode="search"></label>
      <div id="olista" style="max-height:300px;overflow:auto;border:1px solid var(--line);border-radius:10px;padding:0 12px">
        <div class="mut" style="padding:14px 0;color:var(--mut)"><span class="spin" style="border-color:#cbd5e1;border-top-color:var(--pri)"></span> Carregando exames…</div>
      </div>
      <div class="hint" id="ocount"></div>
    </div>
    <div id="oprevwrap" class="card hide">
      <h2>Prévia</h2>
      <div id="oprev"></div>
      <div class="row" style="margin-top:14px">
        <button class="btn sm" id="ocopy">Copiar imagem</button>
        <button class="btn sm sec" id="oshare">Compartilhar</button>
      </div>
      <div class="msg i" id="omsg"></div>
    </div>`;

  const nome = root.querySelector("#onome");
  pacPicker(root.querySelector("#opick"), (p)=>{ nome.value = p.nome; });

  const lista = root.querySelector("#olista");
  const filtro = root.querySelector("#ofiltro");
  const count = root.querySelector("#ocount");
  const prevWrap = root.querySelector("#oprevwrap");
  const prev = root.querySelector("#oprev");
  const omsg = root.querySelector("#omsg");
  const sel = new Map(); // nome -> produto

  function renderPrev(){
    const itens = [...sel.values()];
    if(!itens.length){ prevWrap.classList.add("hide"); return; }
    prevWrap.classList.remove("hide");
    const totalP = itens.reduce((s,x)=>s+x.preco,0);
    const totalPix = itens.reduce((s,x)=>s+x.pix,0);
    prev.innerHTML = `
      <div class="orcprev" id="orccap">
        <div class="oh">
          <div><div class="clin">Clínica Kadri</div><div class="sub">Dr. Leandro Mendes · Infectologia</div></div>
          <div class="sub" style="text-align:right">Orçamento<br>${dataExtenso(root.querySelector("#odata").value)}</div>
        </div>
        ${nome.value.trim()?`<div class="om"><b>Paciente:</b> ${esc(nome.value.trim())}</div>`:""}
        <table>
          <thead><tr><th>Exame</th><th class="v">Valor</th><th class="v">Pix/à vista</th></tr></thead>
          <tbody>${itens.map(x=>`<tr><td>${esc(x.nome)}</td><td class="v">${brl(x.preco)}</td><td class="v">${brl(x.pix)}</td></tr>`).join("")}</tbody>
          <tfoot>
            <tr><td>Total</td><td class="v">${brl(totalP)}</td><td class="v">${brl(totalPix)}</td></tr>
          </tfoot>
        </table>
        <div class="obs">Valores sujeitos a alteração. Orçamento sem validade fiscal. Praça Maastrich, 200, sala 64 — Bragança Paulista/SP · (11) 99611-2338</div>
      </div>`;
  }

  function drawLista(){
    const q = (filtro.value||"").trim().toLowerCase();
    const arr = (_produtos||[]).filter(p=>!q || p.nome.toLowerCase().includes(q));
    lista.innerHTML = arr.length ? arr.map((p,i)=>{
      const on = sel.has(p.nome);
      return `<label class="prod">
        <input type="checkbox" data-nome="${esc(p.nome)}" ${on?"checked":""}>
        <div><div class="nm">${esc(p.nome)}</div><div class="pr">${brl(p.preco)} · Pix ${brl(p.pix)}</div></div>
      </label>`;
    }).join("") : `<div class="mut" style="padding:14px 0;color:var(--mut)">Nenhum exame encontrado.</div>`;
    lista.querySelectorAll("input[type=checkbox]").forEach(cb=>cb.onchange=()=>{
      const p = (_produtos||[]).find(x=>x.nome===cb.dataset.nome);
      if(!p) return;
      if(cb.checked) sel.set(p.nome,p); else sel.delete(p.nome);
      count.textContent = sel.size ? sel.size+" selecionado(s)" : "";
      renderPrev();
    });
  }
  filtro.addEventListener("input", drawLista);
  nome.addEventListener("input", ()=>{ if(sel.size) renderPrev(); });
  root.querySelector("#odata").addEventListener("change", ()=>{ if(sel.size) renderPrev(); });

  carregarProdutos().then(()=>drawLista()).catch(()=>{
    lista.innerHTML = `<div class="msg e show" style="margin:12px 0">Não foi possível carregar a lista de exames. Verifique a conexão e tente novamente.</div>`;
  });

  async function capturar(){
    const node = root.querySelector("#orccap");
    const canvas = await html2canvas(node, {scale:2, backgroundColor:"#ffffff", useCORS:true});
    return await new Promise(r=>canvas.toBlob(r,"image/png"));
  }
  function flash(t,cls){ omsg.textContent=t; omsg.className="msg "+(cls||"i")+" show"; setTimeout(()=>omsg.classList.remove("show"),2600); }

  root.querySelector("#ocopy").onclick = async (e)=>{
    if(!sel.size) return;
    const b=e.target; b.disabled=true; const old=b.textContent; b.innerHTML=`<span class="spin"></span>`;
    try{
      const blob = await capturar();
      try{
        await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]);
        flash("Imagem copiada. Cole no WhatsApp do paciente.","o");
      }catch{
        const file = new File([blob],"orcamento.png",{type:"image/png"});
        if(navigator.canShare && navigator.canShare({files:[file]})){ await navigator.share({files:[file]}); }
        else { const url=URL.createObjectURL(blob); window.open(url,"_blank"); flash("Imagem aberta — segure para copiar/compartilhar.","i"); }
      }
    }catch(err){ flash("Falha ao gerar a imagem.","e"); }
    b.disabled=false; b.textContent=old;
  };
  root.querySelector("#oshare").onclick = async (e)=>{
    if(!sel.size) return;
    const b=e.target; b.disabled=true; const old=b.textContent; b.innerHTML=`<span class="spin" style="border-color:rgba(15,118,110,.3);border-top-color:var(--pri)"></span>`;
    try{
      const blob = await capturar();
      const file = new File([blob],"orcamento.png",{type:"image/png"});
      if(navigator.canShare && navigator.canShare({files:[file]})){ await navigator.share({files:[file], title:"Orçamento"}); }
      else { try{ await navigator.clipboard.write([new ClipboardItem({"image/png":blob})]); flash("Compartilhamento indisponível — imagem copiada.","o"); }
             catch{ const url=URL.createObjectURL(blob); window.open(url,"_blank"); } }
    }catch(err){ flash("Falha ao gerar a imagem.","e"); }
    b.disabled=false; b.textContent=old;
  };
}

/* ========== boot ========== */
(async function boot(){
  // Autenticado => a API responde JSON (array). Não autenticado => redirect p/ "/" (HTML) => json nulo.
  const { ok, json } = await apiJSON("/secretaria/api/pacientes-busca?q=__ping__");
  if(ok && Array.isArray(json)) reset(screenHome,"Secretaria");
  else reset(screenLogin,"Entrar");
})();
</script>
